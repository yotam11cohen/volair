<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Flights — VolAir Airlines</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="results">

  <!-- HEADER -->
  <header class="site-header">
    <nav class="nav-inner">
      <a class="nav-logo" href="index.html">Vol<span>Air</span></a>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="crew.html" data-i18n="nav.crew">Our Crew</a></li>
        <li><a href="fleet.html" data-i18n="nav.fleet">Our Fleet</a></li>
        <li><a href="about.html" data-i18n="nav.about">About</a></li>
        <li><a href="flights.html" class="nav-book-btn" data-i18n="nav.book">Book Now</a></li>
      </ul>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="he">עב</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
    </nav>
  </header>

  <!-- PROGRESS STEPS -->
  <div class="progress-steps">
    <div class="step done">
      <div class="step-dot">✓</div>
      <div class="step-label" data-i18n="step.search">Search</div>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-dot">2</div>
      <div class="step-label" data-i18n="step.flights">Flights</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot">3</div>
      <div class="step-label" data-i18n="step.seats">Seats</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot">4</div>
      <div class="step-label" data-i18n="step.summary">Summary</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot">5</div>
      <div class="step-label" data-i18n="step.payment">Payment</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot">6</div>
      <div class="step-label" data-i18n="step.done">Done</div>
    </div>
  </div>

  <main>
    <div class="results-wrap">

      <!-- Summary bar -->
      <div class="results-summary-bar" id="results-summary">
        <!-- Filled by JS -->
        <span>Loading search details...</span>
      </div>

      <!-- Flight cards — filled by JS -->
      <div id="flights-list">
        <p style="text-align:center; color:var(--mid); padding:40px 0;">Loading available flights…</p>
      </div>

      <!-- Navigation -->
      <div class="results-nav">
        <button id="back-btn" class="btn btn-outline" data-i18n="btn.back">← Back</button>
        <button id="next-btn" class="btn btn-primary" disabled data-i18n="btn.nextSeats">Next: Select Seats →</button>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p><strong>VolAir Airlines</strong> &nbsp;|&nbsp; <a href="about.html">About</a> &nbsp;|&nbsp; <a href="crew.html">Crew</a> &nbsp;|&nbsp; <a href="fleet.html">Fleet</a></p>
    <p style="margin-top:8px;" data-i18n="footer.rights">© 2026 VolAir Airlines. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
